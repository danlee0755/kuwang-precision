<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Kuwang Precision</title>
    <style>
        :root {
            --bg-dark: #0d1117; --bg-card: #161b22; --bg-elevated: #1c2333;
            --border: #30363d; --text-primary: #e6edf3; --text-secondary: #8b949e;
            --text-muted: #6e7681; --accent: #58a6ff; --accent-bright: #79c0ff;
            --gold: #d4a853; --success: #3fb950; --danger: #f85149;
            --radius: 8px; --radius-lg: 14px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-dark); color: var(--text-primary); line-height:1.6;
        }
        .admin-wrapper { display:flex; min-height:100vh; }
        .admin-sidebar {
            width:250px; background: var(--bg-card); border-right:1px solid var(--border);
            padding:24px 0; position:fixed; top:0; left:0; bottom:0; overflow-y:auto; z-index:100;
        }
        .admin-sidebar h3 { padding:0 20px 20px; font-size:1rem; color:var(--accent-bright); border-bottom:1px solid var(--border); margin-bottom:16px; }
        .admin-sidebar nav a {
            display:block; padding:11px 20px; color:var(--text-secondary); font-size:0.87rem;
            cursor:pointer; transition:var(--transition); border-left:3px solid transparent; text-decoration:none;
        }
        .admin-sidebar nav a:hover, .admin-sidebar nav a.active { background:var(--bg-elevated); color:var(--text-primary); border-left-color:var(--accent); }
        .admin-main { margin-left:250px; flex:1; padding:28px 36px; min-height:100vh; }
        .admin-panel { display:none; }
        .admin-panel.active { display:block; }
        .admin-panel h2 { font-size:1.4rem; color:var(--text-primary); margin-bottom:24px; padding-bottom:12px; border-bottom:2px solid var(--border); }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-weight:600; font-size:0.8rem; color:var(--text-muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.5px; }
        .form-group input, .form-group textarea, .form-group select {
            width:100%; padding:10px 13px; border:1px solid var(--border); border-radius:6px;
            font-size:0.9rem; font-family:inherit; background:var(--bg-dark); color:var(--text-primary);
            transition:var(--transition);
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(88,166,255,0.1); }
        .form-group textarea { min-height:80px; resize:vertical; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        .form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
        .card-section { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:22px; margin-bottom:18px; }
        .card-section h3 { font-size:1rem; color:var(--text-primary); margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; }
        .btn { display:inline-flex; align-items:center; gap:6px; padding:10px 22px; border-radius:6px; font-size:0.85rem; font-weight:600; cursor:pointer; border:1px solid transparent; transition:var(--transition); }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-primary:hover { background:#4090e0; }
        .btn-outline { background:transparent; color:var(--text-primary); border-color:var(--border); }
        .btn-outline:hover { background:var(--bg-elevated); }
        .btn-sm { padding:6px 14px; font-size:0.8rem; }
        .btn-icon { width:30px; height:30px; border-radius:5px; border:1px solid var(--border); background:var(--bg-dark); color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:0.85rem; transition:var(--transition); }
        .btn-icon:hover { background:var(--bg-elevated); }
        .btn-icon.danger:hover { background:var(--danger); color:#fff; border-color:var(--danger); }
        .add-new-btn { display:inline-flex; align-items:center; gap:4px; padding:8px 16px; background:var(--success); color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:0.82rem; font-weight:500; transition:var(--transition); }
        .add-new-btn:hover { opacity:0.85; }
        .item-list { border:1px solid var(--border); border-radius:6px; overflow:hidden; }
        .item-row { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-bottom:1px solid var(--border); background:var(--bg-dark); transition:var(--transition); cursor:pointer; }
        .item-row:hover { background:var(--bg-elevated); }
        .item-row:last-child { border-bottom:none; }
        .item-info { flex:1; min-width:0; }
        .item-name { font-weight:600; color:var(--text-primary); font-size:0.88rem; }
        .item-meta { font-size:0.78rem; color:var(--text-muted); margin-top:2px; }
        .item-actions { display:flex; gap:6px; }
        .inline-form { display:none; padding:16px; background:var(--bg-elevated); border-radius:6px; margin:8px 0; }
        .inline-form.open { display:block; }
        .editing-indicator { display:inline-block; padding:2px 8px; background:rgba(88,166,255,0.2); color:var(--accent-bright); border-radius:4px; font-size:0.72rem; font-weight:600; }
        .toast { position:fixed; bottom:24px; right:24px; background:var(--success); color:#fff; padding:12px 22px; border-radius:8px; font-weight:600; z-index:9999; box-shadow:0 8px 30px rgba(0,0,0,0.4); display:none; }
        .toast.show { display:block; }
        .alert { padding:12px 16px; border-radius:6px; margin-bottom:14px; font-size:0.85rem; }
        .alert-info { background:rgba(88,166,255,0.1); border:1px solid rgba(88,166,255,0.25); color:var(--accent-bright); }
        .spec-row { display:grid; grid-template-columns:1fr 2fr auto; gap:8px; margin-bottom:8px; align-items:center; }
        .media-url-row { display:flex; gap:8px; margin-bottom:6px; align-items:center; }
        .media-url-row input { flex:1; }
        @media (max-width:768px) {
            .admin-sidebar { width:100%; position:relative; padding:12px; }
            .admin-sidebar nav { display:flex; flex-wrap:wrap; gap:4px; }
            .admin-sidebar nav a { padding:8px 12px; font-size:0.78rem; border-left:none; border-bottom:2px solid transparent; }
            .admin-sidebar nav a.active { border-left:none; border-bottom-color:var(--accent); }
            .admin-wrapper { flex-direction:column; }
            .admin-main { margin-left:0; padding:16px; }
            .form-row, .form-row-3 { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
<div class="admin-wrapper">
    <aside class="admin-sidebar">
        <h3>⚙️ Admin Panel</h3>
        <nav>
            <a class="active" data-panel="company" onclick="switchPanel('company')">🏢 Company Info</a>
            <a data-panel="homepage" onclick="switchPanel('homepage')">🎬 Homepage Video</a>
            <a data-panel="products" onclick="switchPanel('products')">📦 Products (20)</a>
            <a data-panel="export" onclick="switchPanel('export')">💾 Save & Export</a>
            <a href="index.html" target="_blank" style="margin-top:20px;border-top:1px solid var(--border);padding-top:16px;">👁️ View Website →</a>
        </nav>
    </aside>
    <div class="admin-main" id="admin-main"></div>
</div>
<div class="toast" id="toast"></div>
<script src="js/admin.js"></script>
</body>
</html>
